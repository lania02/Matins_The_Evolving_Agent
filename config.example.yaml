# Matins configuration (model-agnostic). Copy to config.yaml and edit.
# See DESIGN.md sections 11-13.

provider:
  name: openai_compatible           # anthropic | openai | openai_compatible
  model: gemini-2.5-flash-lite
  base_url: https://generativelanguage.googleapis.com/v1beta/openai  # Gemini OpenAI-compatible endpoint
  api_key_env: GEMINI_API_KEY   # NAME of the env var (defined in .env), NOT the key itself

generation:
  n_slots: 4
  temperature: 0.4           # explore aggressiveness (0..1); scales how far B/C/D depart from A
  output_language: bilingual # en | zh | bilingual

novelty:
  search_provider: openalex  # openalex | arxiv | web | none
  k: 5
  # Anti-red-ocean saturation gate (OPTIONAL). For each listed slot, a candidate idea is
  # grounded in REAL literature density (OpenAlex) + closest works, then a judge regenerates
  # it if it is a saturated, undifferentiated "red ocean" restatement. WHICH slots to gate
  # depends on YOUR research direction -- see the note below. Empty list ([]) turns it off.
  #   orthogonal (default) -- the contrarian "jump to a distant domain" slot, prone to
  #                           grabbing that domain's famous-but-saturated flagship topic.
  #   adjacent             -- optional, if your near-core stretches keep hitting crowded ground.
  #   highfit / random     -- NOT recommended: high-fit should exploit your (often crowded)
  #                           core, and random is a deliberately unbiased probe; gating them
  #                           fights their purpose and just burns API calls.
  saturation_gate_slots:
    - orthogonal

messaging:
  channel: telegram          # telegram | none | whatsapp_baileys | whatsapp_cloud
  telegram:
    bot_token_env: MATINS_TELEGRAM_TOKEN
    chat_id: "<your_chat_id>"   # run `matins init-telegram` to discover this
  collect_delay_hours: 3

memory_kernels:
  - { name: fast, window_days: 3,  stride: 1, aggregator: llm_summarize_recent,  feeds: generation }
  - { name: slow, window_days: 30, stride: 1, aggregator: llm_propose_skill_diff, feeds: consolidation }

consolidation:
  cadence_days: 7
  hypothesis_occurrence_threshold: 3
  require_human_approval: true

retrieval:
  # Each entry is a SHORT keyword query (2-3 words), NOT an arXiv category code.
  # The arXiv adapter ANDs the words together (all:w1 AND all:w2 ...), so a bare
  # category like "cs.MA" would be full-text-searched and return nothing useful.
  # Seed these from your interest_seed research areas; they feed FRESH RETRIEVAL.
  sources:
    - mechanism design evolutionary
    - multivariate Hawkes process
    - opinion dynamics phase transition
    - spectral stability multi-agent
    - computational autopoiesis artificial life
    - self-improving language agents
  dedup_against_days: 30
  # The daily feed BLENDS several sources, each capped by its quota, then interleaved
  # and capped at max_items -- a deliberate mix, not a flat pile. Scholarly sources
  # lead; web/community add a minority of timeliness/breakout signal. Set a source to
  # 0 to drop it. openalex's key is optional (lifts the rate limit); tavily reuses the
  # deep_dive TAVILY_API_KEY and is skipped if absent; arxiv + hackernews are keyless.
  blend:
    openalex: 3
    arxiv: 2
    tavily: 2
    hackernews: 1
  max_items: 8
  openalex_api_key_env: OPENALEX_API_KEY

deep_dive:                   # on-demand `dig #N` grounded briefings
  model: ""   # stronger model for synthesis; "" = use provider.model
  web_search: tavily         # tavily | none
  web_api_key_env: TAVILY_API_KEY
  k_per_query: 5             # results requested per query, per searcher
  max_queries: 4             # how many search queries the model decomposes the idea into
  max_sources: 10            # hard cap on sources fed into one briefing (balanced arxiv+web)

interest_seed_file: prompts/interest_seed.md
